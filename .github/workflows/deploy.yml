name: Deploy

on:
  push:
    branches:
      - dev
      - main
      - release-uat
      - release-live

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-ignored-built-dependencies

      - name: Build application
        run: pnpm build

      - name: Set PM2 process name
        id: vars
        shell: bash
        run: |
          BRANCH="${{ github.ref_name }}"

          case "$BRANCH" in
            dev)
              PM2_NAME="mcms-development"
              ;;
            main)
              PM2_NAME="mcms-test"
              ;;
            release-uat)
              PM2_NAME="mcms-uat"
              ;;
            release-live)
              PM2_NAME="mcms-live"
              ;;
            *)
              PM2_NAME="mcms-default"
              ;;
          esac

          echo "PM2_NAME=$PM2_NAME" >> "$GITHUB_OUTPUT"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PNPM_HOME="$HOME/.local/share/pnpm"
            export PATH="$PNPM_HOME:$PATH"

            cd /var/www/monthly-collection-management-system

            git fetch --all
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            pnpm install --no-ignored-built-dependencies

            pnpm build

            if pm2 describe "${{ steps.vars.outputs.PM2_NAME }}" > /dev/null 2>&1; then
              pm2 restart "${{ steps.vars.outputs.PM2_NAME }}"
            else
              pm2 start pnpm --name "${{ steps.vars.outputs.PM2_NAME }}" -- start
            fi

            pm2 save